<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CariAku - Search</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }

        .logo {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: -3px;
        }
        .logo span:nth-child(1) { color: #4285F4; } 
        .logo span:nth-child(2) { color: #EA4335; } 
        .logo span:nth-child(3) { color: #FBBC05; } 
        .logo span:nth-child(4) { color: #34A853; } 
        .logo span:nth-child(5) { color: #4285F4; } 
        .logo span:nth-child(6) { color: #EA4335; } 
        .logo span:nth-child(7) { color: #FBBC05; }

        .search-container {
            width: 90%;
            max-width: 580px;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 30px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-box:hover, .search-box:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(0,0,0,0);
        }

        .trending-section {
            margin-top: 40px;
            text-align: center;
        }

        .trending-title {
            font-size: 14px;
            color: #70757a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .trending-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 600px;
        }

        .trend-item {
            padding: 8px 18px;
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 20px;
            font-size: 13px;
            color: #3c4043;
            text-decoration: none;
            transition: 0.2s;
        }

        .trend-item:hover {
            background: #f1f3f4;
            border-color: #bdc1c6;
        }

        #status { font-size: 12px; color: #999; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo">
        <span>C</span><span>a</span><span>r</span><span>i</span><span>A</span><span>k</span><span>u</span>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="Telusuri CariAku atau ketik URL">
    </div>

    <div class="trending-section">
        <div class="trending-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#70757a"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"></path></svg>
            Sedang tren sekarang
        </div>
        <div id="status">Mengambil data...</div>
        <div class="trending-list" id="trending-list"></div>
    </div>

    <script>
        const apiKey = "2b5649d02b103a727f0084a68a9b2ed44ce9ee9e741d5610b0dea3b16f644d43";
        
        async function getTrending() {
            const listElement = document.getElementById('trending-list');
            const statusElement = document.getElementById('status');

            try {
                // Catatan: Memanggil langsung dari browser mungkin akan terhalang CORS.
                // Jika error, gunakan server proxy atau backend PHP/Node.js.
                const response = await fetch(`https://serpapi.com/search.json?engine=google_trends_trending_now&geo=ID&api_key=${apiKey}`);
                const data = await response.json();

                // Mengambil pencarian hari ini
                const trends = data.daily_searches[0].searches;
                
                statusElement.style.display = 'none';
                
                // Ambil maksimal 7 item
                trends.slice(0, 7).forEach(item => {
                    const chip = document.createElement('a');
                    chip.className = 'trend-item';
                    chip.href = `https://www.google.com/search?q=${encodeURIComponent(item.query)}`;
                    chip.innerText = item.query;
                    listElement.appendChild(chip);
                });

            } catch (error) {
                statusElement.innerText = "Gagal memuat tren. Gunakan server backend untuk menghindari CORS.";
                console.error("Error:", error);
            }
        }

        getTrending();
    </script>
</body>
</html>
