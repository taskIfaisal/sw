<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Auto Download VCF</title>
</head>
<body>
    <h2>Mengambil data dari API...</h2>
    <p id="status">Sedang memproses, file VCF akan otomatis terdownload.</p>

    <script>
        const apiUrl = 'https://11z.co/_w/6804/selection';
        const fixedPhone = '081368627114';

        // Fungsi untuk kapitalisasi huruf awal setiap kata
        function capitalizeWords(str) {
            if (!str) return 'Unknown';
            return str.split(' ').map(word => {
                if (word.length === 0) return word;
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
        }

        async function fetchAndDownload() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Mengambil data dari API...';

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                // Ambil nama dari field 'value' dan kapitalisasi
                const rawNama = data.value || 'unknown';
                const nama = capitalizeWords(rawNama);
                
                // Buat konten VCF (vCard format 3.0)
                const vcfContent = `BEGIN:VCARD
VERSION:3.0
FN:${nama}
TEL;TYPE=CELL:${fixedPhone}
END:VCARD`;
                
                // Download file VCF
                const blob = new Blob([vcfContent], { type: 'text/vcard;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', 'budio.vcf');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                statusEl.innerHTML = `✅ Berhasil! File <strong>budio.vcf</strong> otomatis terdownload.<br>
                                     Data: Nama="${nama}" (sudah kapital), Nomor="${fixedPhone}"<br>
                                     📁 File ini bisa diimpor ke kontak HP Anda.`;
            } catch (error) {
                statusEl.innerHTML = `❌ Error: ${error.message}<br>
                                     Pastikan Anda terhubung ke internet dan API dapat diakses.<br>
                                     <br>📌 <strong>Coba solusi manual:</strong><br>
                                     Jika gagal terus, buka link ini di browser baru:<br>
                                     <a href="${apiUrl}" target="_blank">${apiUrl}</a><br>
                                     Lalu buat VCF manual dengan nama: ${capitalizeWords('animal tiger')}`;
                console.error(error);
            }
        }

        // Langsung jalankan tanpa menunggu klik
        fetchAndDownload();
    </script>
</body>
</html>
