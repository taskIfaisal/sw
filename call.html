<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Download VCF dari API</title>
</head>
<body>
    <h2>Klik tombol untuk mengambil data dari API dan download VCF</h2>
    <button id="downloadBtn" style="padding:10px 20px;font-size:16px;">Ambil Data & Download VCF</button>
    <p id="status">Menunggu tindakan...</p>

    <script>
        const apiUrl = 'https://11z.co/_w/6804/selection';
        const fixedPhone = '08123456789';

        async function fetchAndDownload() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Mengambil data dari API...';

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                // Ambil nama dari field 'value' di API
                const nama = data.value || 'unknown';
                
                // Buat konten VCF (vCard format 3.0)
                const vcfContent = `BEGIN:VCARD
VERSION:3.0
FN:${nama}
TEL;TYPE=CELL:${fixedPhone}
END:VCARD`;
                
                // Download file VCF
                const blob = new Blob([vcfContent], { type: 'text/vcard;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', 'budio.vcf');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                statusEl.innerHTML = `✅ Berhasil! File <strong>budio.vcf</strong> terdownload.<br>
                                     Data: Nama="${nama}", Nomor="${fixedPhone}"<br>
                                     📁 File ini bisa diimpor ke kontak HP Anda.`;
            } catch (error) {
                statusEl.innerHTML = `❌ Error: ${error.message}<br>
                                     Pastikan Anda terhubung ke internet dan API dapat diakses.`;
                console.error(error);
            }
        }

        document.getElementById('downloadBtn').addEventListener('click', fetchAndDownload);
    </script>
</body>
</html>
