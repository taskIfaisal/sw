<!DOCTYPE html>
<html>
<head>
    <title>Download CSV dari API</title>
</head>
<body>
    <h2>Klik tombol untuk mengambil data dari API dan download CSV</h2>
    <button id="downloadBtn">Ambil Data & Download CSV</button>
    <p id="status">Menunggu tindakan...</p>

    <script>
        const apiUrl = 'https://11z.co/_w/6804/selection';
        const fixedPhone = '08123456789';

        async function fetchAndDownload() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Mengambil data dari API...';

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                // Ambil nama dari field 'value' di API
                const nama = data.value || 'unknown';
                
                // Buat konten CSV
                const csvContent = `nama,nomor\n${nama},${fixedPhone}`;
                
                // Download file CSV
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', 'budio.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                statusEl.textContent = `Berhasil! CSV terdownload dengan data: Nama="${nama}", Nomor="${fixedPhone}"`;
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }

        document.getElementById('downloadBtn').addEventListener('click', fetchAndDownload);
    </script>
</body>
</html>
