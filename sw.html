<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="./icon/icon-192x192.png">
    <link rel="apple-touch-startup-image" href="./icon/icon-512x512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stopwatch">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon/icon-192x192.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            background-color: black;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            box-sizing: border-box;
            overflow-y: hidden;
            position: fixed;
            width: 100%;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .time-display {
            display: flex;
            font-size: 20vw;
            font-weight: 200;
            margin: 24vh 0 15.5vh;
            line-height: 1.1;
            letter-spacing: -0.5px;
            font-feature-settings: "tnum";
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .time-part {
            display: inline-block;
            font-variant-numeric: tabular-nums;
        }

        .time-part.separator {
            margin: 0 0.05em;
            font-size: 0.8em;
            transform: translateY(-5%);
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            padding: 0 5vw;
            width: 100%;
            max-width: 400px;
            margin-bottom: 2vh;
        }

        .button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: opacity 0.3s ease;
        }

        .button::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid;
            transition: border-color 0.3s ease;
        }
        
        .reset,
        .lap {
            background-color: rgba(51, 51, 51, 1);
            color: white;
        }
        
        .reset::after,
        .lap::after {
            border-color: rgba(51, 51, 51, 1);
        }

        .start::after {
            border-color: rgba(49, 164, 61, 0.3);
        }

        .stop::after {
            border-color: rgba(255, 69, 58, 0.2);
        }

        .reset.inactive,
        .lap.inactive {
            opacity: 0.5;
            background-color: rgba(44, 44, 46, 1);
        }
        
        .reset.inactive::after,
        .lap.inactive::after {
            border-color: rgba(44, 44, 46, 1);
        }

        .indicator-dots {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .indicator-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: gray;
        }

        .dot-white {
            background-color: white;
        }

        .dot-grey {
            background-color: #666;
        }

        .start {
            background-color: rgba(49, 164, 61, 0.3);
            color: #3cd14b;
        }

        .stop {
            background-color: rgba(255, 69, 58, 0.2);
            color: #FF453A;
        }

        .lap-list-container {
            width: 90%;
            max-width: 400px;
            border-top: 1px solid #333;
            margin-top: 2vh;
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 70px;
            overscroll-behavior: contain;
        }
        
        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            font-size: 1rem;
            font-weight: 500;
            color: white;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            height: 60px;
            background-color: black;
            position: fixed;
            bottom: 0;
            left: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            text-decoration: none;
            color: #aaa;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 400;
            text-align: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            background-image: var(--icon-url);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item.active {
            color: #ffa500;
        }

        .lap-item.fastest {
            color: #3cd14b;
        }

        .lap-item.slowest {
            color: #FF453A;
        }

        /* ========== CUSTOM MODAL STYLE ========== */
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .custom-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: rgba(30, 30, 35, 0.95);
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            padding: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .modal-input {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .modal-input:focus {
            outline: none;
            border-color: #007AFF;
        }

        .modal-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Toggle Switch Style iPhone */
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 5px 0;
        }

        .toggle-label {
            font-size: 16px;
            color: white;
        }

        .toggle-switch {
            position: relative;
            width: 51px;
            height: 31px;
            display: inline-block;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(120, 120, 128, 1);
            transition: 0.3s;
            border-radius: 31px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #34C759;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-btn.save {
            background-color: #007AFF;
            color: white;
        }

        .modal-btn.cancel {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-btn:hover {
            opacity: 0.8;
        }

        /* ========== INPUT TERSEMBUNYI UNTUK ESP32 ========== */
        #hiddenEspInput {
            position: fixed;
            top: -100px;
            left: -100px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            background: transparent;
            border: none;
            color: transparent;
        }

        @media (max-width: 600px) {
            .time-display {
                font-size: 23vw;
            }
        }
    </style>
</head>

<body>
    <!-- INPUT TERSEMBUNYI UNTUK ESP32 BLE KEYBOARD -->
    <input type="text" id="hiddenEspInput" autocomplete="off">

    <div class="time-display" id="time">
        <span class="time-part number" id="min">00</span>
        <span class="time-part separator">:</span>
        <span class="time-part number" id="sec">00</span>
        <span class="time-part separator">,</span>
        <span class="time-part number" id="ms">00</span>
    </div>

    <div class="buttons">
        <div class="button reset" id="leftBtn">Lap</div>
        <div class="indicator-dots">
            <span class="indicator-dot dot-white"></span>
            <span class="indicator-dot dot-grey"></span>
        </div>
        <div class="button start" id="rightBtn">Start</div>
    </div>

    <div class="lap-list-container" id="lapList"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <span class="nav-icon" style="--icon-url: url('./icon/world-clock1.png');"></span>
            <span class="nav-label" id="navWorldClock">World Clock</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon" style="--icon-url: url('./icon/alarms2.png');"></span>
            <span class="nav-label" id="navAlarms">Alarms</span>
        </a>
        <a href="#" class="nav-item active">
            <span class="nav-icon" style="--icon-url: url('./icon/stopwatch-icon2.png');"></span>
            <span class="nav-label" id="navStopwatch">Stopwatch</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon" style="--icon-url: url('./icon/timers2.png');"></span>
            <span class="nav-label" id="navTimers">Timers</span>
        </a>
    </nav>

    <!-- ========== CUSTOM MODAL ========== -->
    <div id="forcedMsModal" class="custom-modal">
        <div class="modal-content">
            <div class="modal-title">Forced Milliseconds</div>
            <input type="text" id="modalInput" class="modal-input" placeholder="Contoh: 11,12,13" autocomplete="off">
            <div class="toggle-container">
                <span class="toggle-label">Mode ON/OFF</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="modalToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="modal-buttons">
                <div id="modalCancel" class="modal-btn cancel">Cancel</div>
                <div id="modalSave" class="modal-btn save">Save</div>
            </div>
        </div>
    </div>

    <script>
        // ========== MENCEGAH SCROLL ==========
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.lap-list-container')) {
                return;
            }
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('wheel', function(e) {
            if (!e.target.closest('.lap-list-container')) {
                e.preventDefault();
            }
        }, { passive: false });
        
        function setBodyHeight() {
            document.body.style.height = window.innerHeight + 'px';
        }
        
        setBodyHeight();
        window.addEventListener('resize', setBodyHeight);
        
        // ========== INPUT TERSEMBUNYI UNTUK ESP32 ==========
        const hiddenInput = document.getElementById('hiddenEspInput');
        let hiddenForceModeEnabled = false; // DEFAULT OFF
        
        // Fungsi untuk fokus ke hidden input (bisa dipanggil dari tombol atau otomatis)
        function focusHiddenInput() {
            hiddenInput.focus();
        }
        
        // Baca perintah dari ESP32 yang diketik di hidden input
        hiddenInput.addEventListener('input', function(e) {
            const value = e.target.value;
            if (value === '1') {
                hiddenForceModeEnabled = true;
                // Update slider di modal
                const modalToggle = document.getElementById('modalToggle');
                if (modalToggle) modalToggle.checked = true;
                console.log('[ESP32] Mode ON');
            } else if (value === '2') {
                hiddenForceModeEnabled = false;
                const modalToggle = document.getElementById('modalToggle');
                if (modalToggle) modalToggle.checked = false;
                console.log('[ESP32] Mode OFF');
            }
            // Clear input setelah diproses
            hiddenInput.value = '';
        });
        
        // Fokus ke hidden input saat halaman dimuat
        setTimeout(() => {
            hiddenInput.focus();
        }, 100);
        
        // Setiap kali user interaksi, pastikan hidden input tetap fokus
        document.addEventListener('click', function() {
            setTimeout(() => {
                if (document.activeElement !== hiddenInput) {
                    hiddenInput.focus();
                }
            }, 10);
        });
        
        // ========== KODE STOPWATCH ==========
        
        const systemLanguage = navigator.language || navigator.userLanguage || 'en-US';
        const isIndonesian = systemLanguage.startsWith('id');
        const isEnglish = systemLanguage.startsWith('en');
        
        const translations = {
            'id': {
                'start': 'Mulai',
                'stop': 'Hentikan',
                'lap': 'Putaran',
                'reset': 'Ulangi',
                'enterValidNumbers': 'Masukkan minimal satu angka antara 00 dan 99.',
                'numbersSaved': 'angka milidetik telah disimpan.',
                'lapText': 'Putaran',
                'worldClock': 'Jam Dunia',
                'alarms': 'Alarm',
                'stopwatch': 'Stopwatch',
                'timers': 'Timer'
            },
            'en': {
                'start': 'Start',
                'stop': 'Stop',
                'lap': 'Lap',
                'reset': 'Reset',
                'enterValidNumbers': 'Enter at least one number between 00 and 99.',
                'numbersSaved': 'millisecond numbers have been saved.',
                'lapText': 'Lap',
                'worldClock': 'World Clock',
                'alarms': 'Alarms',
                'stopwatch': 'Stopwatch',
                'timers': 'Timers'
            }
        };
        
        let lang = 'en';
        if (isIndonesian) {
            lang = 'id';
        } else if (isEnglish) {
            lang = 'en';
        }
        
        function t(key) {
            return translations[lang][key] || translations['en'][key];
        }

        let forcedMsList = [];
        let forcedMsIndex = 0;
        let forcedMs = null;
        let isStartedOnce = false;

        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        let lapCount = 1;

        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const lapList = document.getElementById('lapList');

        const minEl = document.getElementById('min');
        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');

        const navWorldClock = document.getElementById('navWorldClock');
        const navAlarms = document.getElementById('navAlarms');
        const navStopwatch = document.getElementById('navStopwatch');
        const navTimers = document.getElementById('navTimers');

        let lapTimestamps = [];

        let lastClickTime = 0;
        const DOUBLE_CLICK_DELAY = 300;

        // Modal elements
        const modal = document.getElementById('forcedMsModal');
        const modalInput = document.getElementById('modalInput');
        const modalToggle = document.getElementById('modalToggle');
        const modalSave = document.getElementById('modalSave');
        const modalCancel = document.getElementById('modalCancel');

        function initializeLanguage() {
            leftBtn.textContent = t('lap');
            rightBtn.textContent = t('start');
            
            navWorldClock.textContent = t('worldClock');
            navAlarms.textContent = t('alarms');
            navStopwatch.textContent = t('stopwatch');
            navTimers.textContent = t('timers');
            
            document.title = t('stopwatch');
            
            leftBtn.classList.remove("reset");
            leftBtn.classList.add("lap");
            rightBtn.classList.remove("stop");
            rightBtn.classList.add("start");
        }

        initializeLanguage();

        function isZeroTime() {
            const totalTime = elapsedTime + (forcedMs !== null ? forcedMs * 10 : 0);
            return totalTime === 0;
        }

        function updateLeftButtonOpacity() {
            if (isZeroTime()) {
                leftBtn.classList.add('inactive');
            } else {
                leftBtn.classList.remove('inactive');
            }
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            const milliseconds = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
            return `${minutes}:${seconds},${milliseconds}`;
        }

        function updateTime() {
            const now = Date.now();
            elapsedTime = now - startTime;

            const totalSeconds = Math.floor(elapsedTime / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');

            let milliseconds;
            if (!isRunning && forcedMs !== null) {
                milliseconds = forcedMs.toString().padStart(2, '0');
            } else {
                milliseconds = Math.floor((elapsedTime % 1000) / 10).toString().padStart(2, '0');
            }

            minEl.textContent = minutes;
            secEl.textContent = seconds;
            msEl.textContent = milliseconds;

            updateLeftButtonOpacity();

            if (lapList.firstChild && lapTimestamps.length > 0) {
                let lapTime;
                if (!isRunning && forcedMs !== null) {
                    lapTime = Math.floor(elapsedTime / 1000) * 1000 + forcedMs * 10 - lapTimestamps[lapTimestamps.length - 1];
                } else {
                    lapTime = elapsedTime - lapTimestamps[lapTimestamps.length - 1];
                }
                lapList.firstChild.querySelector('span:last-child').textContent = formatTime(lapTime);
            }
        }

        function startTimer() {
            if (isStartedOnce) {
                startTime = Date.now() - elapsedTime;
            } else {
                startTime = Date.now() - elapsedTime;
                isStartedOnce = true;
            }

            timerInterval = setInterval(updateTime, 10);
            isRunning = true;

            rightBtn.textContent = t('stop');
            rightBtn.classList.remove("start");
            rightBtn.classList.add("stop");

            leftBtn.textContent = t('lap');
            leftBtn.classList.remove("reset");
            leftBtn.classList.add("lap");

            updateLeftButtonOpacity();

            if (lapCount === 1) addLap();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;

            if (hiddenForceModeEnabled && forcedMsIndex < forcedMsList.length) {
                forcedMs = forcedMsList[forcedMsIndex++];
                console.log('[HIDDEN] Pakai angka paksaan:', forcedMs);
                
                if (forcedMsIndex >= forcedMsList.length) {
                    hiddenForceModeEnabled = false;
                    if (modalToggle) modalToggle.checked = false;
                    console.log('[HIDDEN] Angka habis, auto OFF');
                }
            } else {
                forcedMs = null;
            }

            updateTime();

            rightBtn.textContent = t('start');
            rightBtn.classList.remove("stop");
            rightBtn.classList.add("start");

            leftBtn.textContent = t('reset');
            leftBtn.classList.remove("lap");
            leftBtn.classList.add("reset");

            updateLeftButtonOpacity();
        }

        function resetTimer() {
            elapsedTime = 0;
            lapCount = 1;
            lapTimestamps = [];
            forcedMs = null;
            isStartedOnce = false;
            minEl.textContent = "00";
            secEl.textContent = "00";
            msEl.textContent = "00";
            lapList.innerHTML = '';

            rightBtn.textContent = t('start');
            rightBtn.classList.remove("stop");
            rightBtn.classList.add("start");

            leftBtn.textContent = t('lap');
            leftBtn.classList.remove("reset");
            leftBtn.classList.add("lap");

            updateLeftButtonOpacity();
        }

        function addLap() {
            let currentElapsed;

            if (!isRunning && forcedMs !== null) {
                currentElapsed = elapsedTime + forcedMs * 10;
            } else {
                currentElapsed = elapsedTime;
            }

            const previousElapsed = lapTimestamps.length > 0 ? lapTimestamps[lapTimestamps.length - 1] : 0;
            const lapTime = currentElapsed - previousElapsed;

            lapTimestamps.push(currentElapsed);

            const formattedLapTime = formatTime(lapTime);

            const lapItem = document.createElement("div");
            lapItem.className = "lap-item";
            lapItem.innerHTML = `<span>${t('lapText')} ${lapCount++}</span><span>${formattedLapTime}</span>`;
            lapItem.dataset.lapTime = lapTime;

            lapList.prepend(lapItem);

            updateLapTimes();
        }

        function updateLapTimes() {
            const laps = Array.from(lapList.querySelectorAll('.lap-item'));

            if (laps.length < 3) {
                laps.forEach(lap => {
                    lap.classList.remove('fastest', 'slowest');
                });
                return;
            }

            const lapTimes = laps.map(lap => parseInt(lap.dataset.lapTime));
            const fastestTime = Math.min(...lapTimes);
            const slowestTime = Math.max(...lapTimes);

            laps.forEach(lap => {
                lap.classList.remove('fastest', 'slowest');
                const time = parseInt(lap.dataset.lapTime);
                if (time === fastestTime) {
                    lap.classList.add('fastest');
                } else if (time === slowestTime) {
                    lap.classList.add('slowest');
                }
            });
        }

        // ========== FUNGSI MODAL ==========
        function openModal() {
            if (forcedMsList.length > 0) {
                modalInput.value = forcedMsList.join(',');
            } else {
                modalInput.value = '';
            }
            modalToggle.checked = hiddenForceModeEnabled;
            modal.classList.add('active');
            // Jangan ganggu hidden input focus
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => {
                hiddenInput.focus();
            }, 50);
        }

        function saveModal() {
            const inputValue = modalInput.value.trim();
            
            if (inputValue !== '') {
                const values = inputValue.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v) && v >= 0 && v <= 99);
                
                if (values.length === 0) {
                    alert(t('enterValidNumbers'));
                    return;
                }
                
                forcedMsList = values;
                forcedMsIndex = 0;
                forcedMs = null;
                console.log('[HIDDEN] Angka paksaan baru:', forcedMsList);
                alert(`${values.length} ${t('numbersSaved')}`);
            }
            
            hiddenForceModeEnabled = modalToggle.checked;
            console.log('[HIDDEN] Mode dari slider:', hiddenForceModeEnabled ? 'ON' : 'OFF');
            
            closeModal();
            updateLeftButtonOpacity();
        }

        modalSave.addEventListener('click', saveModal);
        modalCancel.addEventListener('click', closeModal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // ========== DOUBLE CLICK PADA MILIDETIK ==========
        msEl.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const timeSinceLastClick = currentTime - lastClickTime;
            
            if (timeSinceLastClick < DOUBLE_CLICK_DELAY && timeSinceLastClick > 0) {
                e.preventDefault();
                openModal();
                lastClickTime = 0;
            } else {
                lastClickTime = currentTime;
                
                setTimeout(() => {
                    if (lastClickTime !== 0 && new Date().getTime() - lastClickTime >= DOUBLE_CLICK_DELAY) {
                        lastClickTime = 0;
                    }
                }, DOUBLE_CLICK_DELAY);
            }
        });

        rightBtn.addEventListener('click', () => {
            isRunning ? stopTimer() : startTimer();
        });

        leftBtn.addEventListener('click', () => {
            if (leftBtn.classList.contains('inactive')) {
                return;
            }
            isRunning ? addLap() : resetTimer();
        });

        updateLeftButtonOpacity();
        
        console.log('System language detected:', systemLanguage);
        console.log('Using language:', lang);
        console.log('[ESP32] Hidden input ready - kirim angka 1 untuk ON, 2 untuk OFF');
        console.log('[ESP32] Pastikan ESP32 terhubung sebagai BLE Keyboard');
        console.log('[ESP32] Buka halaman ini, lalu ketik 1 atau 2 dari keyboard ESP32');
    </script>
