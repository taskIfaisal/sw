<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Peek</title>

  <link rel="apple-touch-icon" href="./icon/inject-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: pan-x pan-y;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
    touch-action: pan-x pan-y;
  }

  body {
    position: fixed;
    inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    touch-action: pan-x pan-y;
  }

  #preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    object-position: center;
    display: none;
    z-index: 2;
  }

  #uploadMenu {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 10px;
    z-index: 10;
  }

  /* 🔥 FIX FONT iPHONE */
  #textOverlay, #textOverlay2 {
    position: absolute;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
    white-space: nowrap;
    transition: all 0.05s ease;

    font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    letter-spacing: -0.2px;
  }

  #settingPanel {
    position: fixed;
    bottom: -60%;
    left: 0;
    width: 100%;
    height: 60%;
    background: rgba(30,30,40,0.95);
    backdrop-filter: blur(20px);
    border-radius: 25px 25px 0 0;
    z-index: 100;
    transition: bottom 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    padding: 20px;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
  }

  #settingPanel.open {
    bottom: 0;
  }

  .panel-handle {
    width: 50px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
    margin: 0 auto 20px auto;
    cursor: pointer;
  }

  .panel-content {
    height: calc(100% - 30px);
    overflow-y: auto;
    padding-right: 5px;
  }

  .setting-section {
    margin-bottom: 25px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 15px;
  }

  .setting-section h3 {
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .setting-section label {
    font-size: 13px;
    opacity: 0.8;
    display: block;
    margin-bottom: 5px;
  }

  .setting-section input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 10px;
  }

  .setting-section input[type="range"] {
    width: 100%;
    margin: 10px 0;
  }

  .iphone-toggle {
    position: relative;
    display: inline-block;
    width: 51px;
    height: 31px;
  }

  .iphone-toggle input {
    opacity: 0;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: rgba(255,255,255,0.3);
    border-radius: 34px;
  }

  .toggle-slider:before {
    content: "";
    position: absolute;
    height: 27px;
    width: 27px;
    left: 2px;
    bottom: 2px;
    background: white;
    border-radius: 50%;
  }

  input:checked + .toggle-slider {
    background-color: #34c759;
  }

  input:checked + .toggle-slider:before {
    transform: translateX(20px);
  }

  .arrow-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 28px;
    width: 55px;
    height: 55px;
    border-radius: 30px;
  }

  .reset-btn {
    background: rgba(255,59,48,0.8);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
    font-size: 14px;
  }

  </style>
</head>

<body>

  <div id="uploadMenu">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="textOverlay">Memuat...</div>
  <div id="textOverlay2">Memuat...</div>

  <img id="preview" alt="" />

<script>
// === SEMUA SCRIPT ASLI KAMU TIDAK DIUBAH ===

const uploadMenu = document.getElementById('uploadMenu');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const textOverlay = document.getElementById('textOverlay');
const textOverlay2 = document.getElementById('textOverlay2');

const STORAGE_KEY = 'peek_saved_image';

let currentLeftText = 'Facebook';
let currentRightText = 'Mail';

function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

async function updateTextFromAPI() {
  try {
    const response = await fetch('https://11z.co/_w/6804/selection?_t=' + Date.now());
    const data = await response.json();

    if (data.value) {
      const words = data.value.trim().split(/\s+/);
      currentLeftText = capitalize(words[0] || 'Facebook');
      currentRightText = capitalize(words[1] || 'Mail');

      textOverlay.textContent = currentLeftText;
      textOverlay2.textContent = currentRightText;
    }
  } catch (err) {}
}

window.addEventListener('load', function() {
  const savedImage = localStorage.getItem(STORAGE_KEY);
  if (savedImage) {
    preview.src = savedImage;
    preview.style.display = 'block';
    textOverlay.style.display = 'block';
    textOverlay2.style.display = 'block';
  }

  updateTextFromAPI();
  setInterval(updateTextFromAPI, 2000);
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const imageData = evt.target.result;
      localStorage.setItem(STORAGE_KEY, imageData);
      preview.src = imageData;
      preview.style.display = 'block';
      uploadMenu.style.display = 'none';
      textOverlay.style.display = 'block';
      textOverlay2.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

</script>

</body>
</html>
