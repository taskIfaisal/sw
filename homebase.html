<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Peek</title>

  <link rel="apple-touch-icon" href="./icon/inject-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: pan-x pan-y;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
    touch-action: pan-x pan-y;
  }

  body {
    position: fixed;
    inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    touch-action: pan-x pan-y;
  }

  /* PREVIEW GAMBAR */
  #preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    object-position: center;
    display: none;
    z-index: 2;
  }

  /* UPLOAD MENU */
  #uploadMenu {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 10px;
    z-index: 10;
  }

  /* TEXT OVERLAY - di atas gambar */
  #textOverlay, #textOverlay2 {
    position: absolute;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
    white-space: nowrap;
    transition: all 0.05s ease;
  }

  /* SETTING PANEL (SETENGAH LAYAR) */
  #settingPanel {
    position: fixed;
    bottom: -60%;
    left: 0;
    width: 100%;
    height: 60%;
    background: rgba(30,30,40,0.95);
    backdrop-filter: blur(20px);
    border-radius: 25px 25px 0 0;
    z-index: 100;
    transition: bottom 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    padding: 20px;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
  }

  #settingPanel.open {
    bottom: 0;
  }

  .panel-handle {
    width: 50px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
    margin: 0 auto 20px auto;
    cursor: pointer;
  }

  .panel-content {
    height: calc(100% - 30px);
    overflow-y: auto;
    padding-right: 5px;
  }

  .setting-section {
    margin-bottom: 25px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 15px;
  }

  .setting-section h3 {
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .setting-section label {
    font-size: 13px;
    opacity: 0.8;
    display: block;
    margin-bottom: 5px;
  }

  .setting-section input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 10px;
  }

  .setting-section input[type="text"]:read-only {
    cursor: default;
    background: rgba(255,255,255,0.08);
  }

  .setting-section input[type="range"] {
    width: 100%;
    margin: 10px 0;
  }

  /* Toggle Switch ala iPhone */
  .toggle-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  
  .toggle-label {
    font-size: 15px;
    font-weight: 500;
  }
  
  .toggle-label small {
    font-size: 12px;
    opacity: 0.7;
    margin-left: 5px;
  }
  
  .iphone-toggle {
    position: relative;
    display: inline-block;
    width: 51px;
    height: 31px;
  }
  
  .iphone-toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255,255,255,0.3);
    transition: 0.3s;
    border-radius: 34px;
  }
  
  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 27px;
    width: 27px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: 0.3s;
    border-radius: 50%;
  }
  
  input:checked + .toggle-slider {
    background-color: #34c759;
  }
  
  input:checked + .toggle-slider:before {
    transform: translateX(20px);
  }
  
  .mode-badge {
    font-size: 12px;
    text-align: center;
    padding: 6px;
    border-radius: 8px;
    margin-top: 8px;
  }
  
  .mode-badge.api {
    background: rgba(52, 199, 89, 0.2);
    color: #34c759;
  }
  
  .mode-badge.custom {
    background: rgba(255, 159, 10, 0.2);
    color: #ff9f0a;
  }

  .nav-arrows {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .arrow-row {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .arrow-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 28px;
    width: 55px;
    height: 55px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }

  .arrow-btn:active {
    background: rgba(255,255,255,0.4);
    transform: scale(0.95);
  }

  .text-selector {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    justify-content: center;
  }

  .text-selector button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    touch-action: manipulation;
  }

  .text-selector button.active {
    background: #007aff;
  }

  .reset-btn {
    background: rgba(255,59,48,0.8);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    touch-action: manipulation;
  }

  .font-size-value {
    display: inline-block;
    margin-left: 10px;
    background: rgba(255,255,255,0.2);
    padding: 2px 10px;
    border-radius: 15px;
    font-size: 12px;
  }
  
  .info-text {
    font-size: 11px;
    opacity: 0.5;
    text-align: center;
    margin-top: 10px;
  }
  </style>
</head>

<body>

  <div id="uploadMenu">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="textOverlay">Memuat...</div>
  <div id="textOverlay2">Memuat...</div>

  <img id="preview" alt="" />

  <!-- SETTING PANEL SETENGAH LAYAR -->
  <div id="settingPanel">
    <div class="panel-handle"></div>
    <div class="panel-content">
      
      <!-- TOGGLE ON/OFF ala iPhone -->
      <div class="setting-section">
        <h3>📡 Sumber Teks</h3>
        <div class="toggle-container">
          <span class="toggle-label">
            🌐 Mode API <small>(ON = API / OFF = Custom)</small>
          </span>
          <label class="iphone-toggle">
            <input type="checkbox" id="apiToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="modeBadge" class="mode-badge api">✅ Mode API: Menampilkan data dari server</div>
      </div>

      <!-- EDIT TEKS CUSTOM (hanya aktif saat mode OFF) -->
      <div class="setting-section" id="customTextSection">
        <h3>✏️ Edit Teks Custom</h3>
        <label>TEKS KIRI</label>
        <input type="text" id="editTextLeft" placeholder="Teks kiri custom" disabled>
        <label>TEKS KANAN</label>
        <input type="text" id="editTextRight" placeholder="Teks kanan custom" disabled>
        <div class="info-text">Mode OFF untuk mengedit teks custom</div>
      </div>

      <div class="setting-section">
        <h3>🔤 Ukuran Font</h3>
        <label>Ukuran: <span id="fontSizeValue" class="font-size-value">12px</span></label>
        <input type="range" id="fontSizeSlider" min="8" max="48" step="1" value="12">
      </div>

      <div class="setting-section">
        <h3>🎯 Pilih Teks & Geser Posisi</h3>
        <div class="text-selector">
          <button id="selectLeftBtn" class="active">TEKS KIRI</button>
          <button id="selectRightBtn">TEKS KANAN</button>
        </div>
        <div class="nav-arrows">
          <div class="arrow-row">
            <button class="arrow-btn" data-dir="up">▲</button>
          </div>
          <div class="arrow-row">
            <button class="arrow-btn" data-dir="left">◀</button>
            <button class="arrow-btn" data-dir="down">▼</button>
            <button class="arrow-btn" data-dir="right">▶</button>
          </div>
        </div>
      </div>

      <button class="reset-btn" id="resetPosBtn">↺ Reset Posisi & Ukuran</button>
    </div>
  </div>

<script>
const uploadMenu = document.getElementById('uploadMenu');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const textOverlay = document.getElementById('textOverlay');
const textOverlay2 = document.getElementById('textOverlay2');
const settingPanel = document.getElementById('settingPanel');
const editTextLeft = document.getElementById('editTextLeft');
const editTextRight = document.getElementById('editTextRight');
const apiToggle = document.getElementById('apiToggle');
const modeBadge = document.getElementById('modeBadge');
const customTextSection = document.getElementById('customTextSection');

const STORAGE_KEY = 'peek_saved_image';
const SETTING_KEY = 'peek_settings';
const CUSTOM_TEXT_KEY = 'peek_custom_text';

// Variabel untuk posisi dan ukuran
let currentSelected = 'left';
let leftPos = { top: 25.5, left: 38.5 };
let rightPos = { top: 25.5, left: 61.5 };
let fontSize = 12;

// Data dari API
let currentLeftText = 'Facebook';
let currentRightText = 'Mail';

// Data custom text
let customLeftText = 'Facebook';
let customRightText = 'Mail';

// Mode: true = API, false = Custom
let useAPI = true;

// Variabel untuk triple tap
let tapCount = 0;
let tapTimeout = null;

// Load settings dari localStorage
function loadSettings() {
  const saved = localStorage.getItem(SETTING_KEY);
  if (saved) {
    try {
      const settings = JSON.parse(saved);
      leftPos = settings.leftPos || { top: 25.5, left: 38.5 };
      rightPos = settings.rightPos || { top: 25.5, left: 61.5 };
      fontSize = settings.fontSize || 12;
      useAPI = settings.useAPI !== undefined ? settings.useAPI : true;
      
      document.getElementById('fontSizeSlider').value = fontSize;
      document.getElementById('fontSizeValue').textContent = fontSize + 'px';
      apiToggle.checked = useAPI;
      
      updateTextPosition();
      updateFontSize();
      updateModeUI();
    } catch(e) {}
  }
  
  // Load custom text dari localStorage
  const savedCustom = localStorage.getItem(CUSTOM_TEXT_KEY);
  if (savedCustom) {
    try {
      const custom = JSON.parse(savedCustom);
      customLeftText = custom.left || 'Facebook';
      customRightText = custom.right || 'Mail';
      editTextLeft.value = customLeftText;
      editTextRight.value = customRightText;
    } catch(e) {}
  } else {
    editTextLeft.value = customLeftText;
    editTextRight.value = customRightText;
  }
}

// Simpan settings ke localStorage
function saveSettings() {
  const settings = {
    leftPos: leftPos,
    rightPos: rightPos,
    fontSize: fontSize,
    useAPI: useAPI
  };
  localStorage.setItem(SETTING_KEY, JSON.stringify(settings));
}

// Simpan custom text
function saveCustomText() {
  const custom = {
    left: customLeftText,
    right: customRightText
  };
  localStorage.setItem(CUSTOM_TEXT_KEY, JSON.stringify(custom));
}

// Update UI mode indicator
function updateModeUI() {
  if (useAPI) {
    modeBadge.innerHTML = '✅ Mode API: Menampilkan data dari server';
    modeBadge.className = 'mode-badge api';
    editTextLeft.disabled = true;
    editTextRight.disabled = true;
    editTextLeft.style.opacity = '0.5';
    editTextRight.style.opacity = '0.5';
  } else {
    modeBadge.innerHTML = '✏️ Mode Custom: Menampilkan teks yang diedit manual';
    modeBadge.className = 'mode-badge custom';
    editTextLeft.disabled = false;
    editTextRight.disabled = false;
    editTextLeft.style.opacity = '1';
    editTextRight.style.opacity = '1';
  }
}

// Update tampilan teks berdasarkan mode
function updateTextDisplay() {
  if (useAPI) {
    textOverlay.textContent = currentLeftText;
    textOverlay2.textContent = currentRightText;
  } else {
    textOverlay.textContent = customLeftText;
    textOverlay2.textContent = customRightText;
  }
}

// Update posisi teks
function updateTextPosition() {
  textOverlay.style.top = leftPos.top + '%';
  textOverlay.style.left = leftPos.left + '%';
  textOverlay.style.transform = 'translateX(-50%)';
  
  textOverlay2.style.top = rightPos.top + '%';
  textOverlay2.style.left = rightPos.left + '%';
  textOverlay2.style.transform = 'translateX(-50%)';
}

// Update ukuran font
function updateFontSize() {
  textOverlay.style.fontSize = fontSize + 'px';
  textOverlay2.style.fontSize = fontSize + 'px';
  document.getElementById('fontSizeValue').textContent = fontSize + 'px';
}

// Geser posisi
function moveText(direction) {
  const step = 0.5;
  
  if (currentSelected === 'left') {
    switch(direction) {
      case 'up': leftPos.top = Math.max(5, leftPos.top - step); break;
      case 'down': leftPos.top = Math.min(90, leftPos.top + step); break;
      case 'left': leftPos.left = Math.max(15, leftPos.left - step); break;
      case 'right': leftPos.left = Math.min(85, leftPos.left + step); break;
    }
  } else {
    switch(direction) {
      case 'up': rightPos.top = Math.max(5, rightPos.top - step); break;
      case 'down': rightPos.top = Math.min(90, rightPos.top + step); break;
      case 'left': rightPos.left = Math.max(35, rightPos.left - step); break;
      case 'right': rightPos.left = Math.min(85, rightPos.left + step); break;
    }
  }
  updateTextPosition();
  saveSettings();
}

// Reset posisi dan ukuran
function resetPositionAndSize() {
  leftPos = { top: 25.5, left: 38.5 };
  rightPos = { top: 25.5, left: 61.5 };
  fontSize = 12;
  
  document.getElementById('fontSizeSlider').value = fontSize;
  document.getElementById('fontSizeValue').textContent = fontSize + 'px';
  
  updateTextPosition();
  updateFontSize();
  saveSettings();
}

// Capitalize
function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// API text
async function updateTextFromAPI() {
  if (!useAPI) return; // Skip jika mode custom
  
  try {
    const response = await fetch('https://11z.co/_w/6804/selection?_t=' + Date.now());
    const data = await response.json();

    if (data.value) {
      const words = data.value.trim().split(/\s+/);
      currentLeftText = capitalize(words[0] || 'Facebook');
      currentRightText = capitalize(words[1] || 'Mail');
      
      updateTextDisplay();
    }
  } catch (err) {
    if (currentLeftText === 'Memuat...') {
      currentLeftText = 'Facebook';
      currentRightText = 'Mail';
      updateTextDisplay();
    }
  }
}

// Gesture 2 jari swipe down
let touchStartY = null;
let touchCount = 0;

document.addEventListener('touchstart', function(e) {
  touchCount = e.touches.length;
  if (touchCount === 2) {
    touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
});

document.addEventListener('touchmove', function(e) {
  if (touchCount === 2 && touchStartY !== null) {
    const currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const deltaY = currentY - touchStartY;
    
    if (deltaY > 60) {
      settingPanel.classList.add('open');
      touchStartY = null;
      e.preventDefault();
    }
  }
});

// Tutup panel
document.querySelector('.panel-handle').addEventListener('click', () => {
  settingPanel.classList.remove('open');
});

// TRIPLE TAP untuk upload
document.body.addEventListener('touchstart', function(e) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
    return;
  }
  
  tapCount++;
  
  if (tapCount === 3) {
    uploadMenu.style.display = 'block';
    tapCount = 0;
    clearTimeout(tapTimeout);
  }
  
  clearTimeout(tapTimeout);
  tapTimeout = setTimeout(() => {
    tapCount = 0;
  }, 500);
});

// Load data
window.addEventListener('load', function() {
  loadSettings();
  
  const savedImage = localStorage.getItem(STORAGE_KEY);
  if (savedImage) {
    preview.src = savedImage;
    preview.style.display = 'block';
    textOverlay.style.display = 'block';
    textOverlay2.style.display = 'block';
  }
  
  updateTextDisplay();
  updateTextFromAPI();
  setInterval(updateTextFromAPI, 2000);
});

// Upload gambar
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const imageData = evt.target.result;
      localStorage.setItem(STORAGE_KEY, imageData);
      preview.src = imageData;
      preview.style.display = 'block';
      uploadMenu.style.display = 'none';
      textOverlay.style.display = 'block';
      textOverlay2.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

// Toggle API / Custom mode
apiToggle.addEventListener('change', (e) => {
  useAPI = e.target.checked;
  updateModeUI();
  updateTextDisplay();
  saveSettings();
  
  // Jika mode API, ambil data terbaru
  if (useAPI) {
    updateTextFromAPI();
  }
});

// Edit custom text
editTextLeft.addEventListener('input', (e) => {
  customLeftText = e.target.value || 'Facebook';
  saveCustomText();
  if (!useAPI) updateTextDisplay();
});

editTextRight.addEventListener('input', (e) => {
  customRightText = e.target.value || 'Mail';
  saveCustomText();
  if (!useAPI) updateTextDisplay();
});

// Font size slider
document.getElementById('fontSizeSlider').addEventListener('input', (e) => {
  fontSize = parseInt(e.target.value);
  updateFontSize();
  saveSettings();
});

// Selector teks
document.getElementById('selectLeftBtn').addEventListener('click', () => {
  currentSelected = 'left';
  document.getElementById('selectLeftBtn').classList.add('active');
  document.getElementById('selectRightBtn').classList.remove('active');
});

document.getElementById('selectRightBtn').addEventListener('click', () => {
  currentSelected = 'right';
  document.getElementById('selectRightBtn').classList.add('active');
  document.getElementById('selectLeftBtn').classList.remove('active');
});

// Tombol panah
document.querySelectorAll('.arrow-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const dir = btn.getAttribute('data-dir');
    moveText(dir);
  });
});

// Reset button
document.getElementById('resetPosBtn').addEventListener('click', () => {
  resetPositionAndSize();
});

// Mencegah zoom
document.addEventListener('touchmove', function(e) {
  if (e.touches.length > 1) {
    e.preventDefault();
  }
}, { passive: false });
</script>

</body>
</html>
