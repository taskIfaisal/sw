<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Peek</title>

  <link rel="apple-touch-icon" href="./icon/inject-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }

  body {
    position: fixed;
    inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  /* PREVIEW GAMBAR */
  #preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    object-position: center;
    display: none;
    z-index: 2;
  }

  /* UPLOAD MENU */
  #uploadMenu {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 10px;
    z-index: 10;
  }

  /* TEXT OVERLAY */
  #textOverlay, #textOverlay2 {
    position: absolute;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
    cursor: move;
    white-space: nowrap;
    transition: all 0.1s ease;
  }

  /* SETTING PANEL (SETENGAH LAYAR) */
  #settingPanel {
    position: fixed;
    bottom: -60%;
    left: 0;
    width: 100%;
    height: 60%;
    background: rgba(30,30,40,0.95);
    backdrop-filter: blur(20px);
    border-radius: 25px 25px 0 0;
    z-index: 100;
    transition: bottom 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    padding: 20px;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
  }

  #settingPanel.open {
    bottom: 0;
  }

  /* Handle/grip untuk panel */
  .panel-handle {
    width: 50px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
    margin: 0 auto 20px auto;
    cursor: pointer;
  }

  /* Scroll area dalam panel */
  .panel-content {
    height: calc(100% - 30px);
    overflow-y: auto;
    padding-right: 5px;
  }

  /* Styling form dalam panel */
  .setting-section {
    margin-bottom: 25px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 15px;
  }

  .setting-section h3 {
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .setting-section label {
    font-size: 13px;
    opacity: 0.8;
    display: block;
    margin-bottom: 5px;
  }

  .setting-section input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .setting-section input[type="range"] {
    width: 100%;
    margin: 10px 0;
  }

  /* Navigator panah */
  .nav-arrows {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .arrow-row {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .arrow-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 28px;
    width: 55px;
    height: 55px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .arrow-btn:active {
    background: rgba(255,255,255,0.4);
    transform: scale(0.95);
  }

  /* Pilih teks yang akan digerakkan */
  .text-selector {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    justify-content: center;
  }

  .text-selector button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
  }

  .text-selector button.active {
    background: #007aff;
  }

  /* Reset button */
  .reset-btn {
    background: rgba(255,59,48,0.8);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
  }

  .font-size-value {
    display: inline-block;
    margin-left: 10px;
    background: rgba(255,255,255,0.2);
    padding: 2px 10px;
    border-radius: 15px;
    font-size: 12px;
  }
  </style>
</head>

<body>

  <div id="uploadMenu">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="textOverlay">Facebook</div>
  <div id="textOverlay2">Mail</div>

  <img id="preview" alt="" />

  <!-- SETTING PANEL SETENGAH LAYAR -->
  <div id="settingPanel">
    <div class="panel-handle"></div>
    <div class="panel-content">
      <div class="setting-section">
        <h3>✏️ Edit Teks</h3>
        <label>TEKS KIRI (Facebook)</label>
        <input type="text" id="editTextLeft" placeholder="Teks kiri">
        <label>TEKS KANAN (Mail)</label>
        <input type="text" id="editTextRight" placeholder="Teks kanan">
      </div>

      <div class="setting-section">
        <h3>🔤 Ukuran Font</h3>
        <label>Ukuran: <span id="fontSizeValue" class="font-size-value">12px</span></label>
        <input type="range" id="fontSizeSlider" min="10" max="48" step="1" value="12">
      </div>

      <div class="setting-section">
        <h3>🎯 Pilih Teks & Geser Posisi</h3>
        <div class="text-selector">
          <button id="selectLeftBtn" class="active">TEKS KIRI</button>
          <button id="selectRightBtn">TEKS KANAN</button>
        </div>
        <div class="nav-arrows">
          <div class="arrow-row">
            <button class="arrow-btn" data-dir="up">▲</button>
          </div>
          <div class="arrow-row">
            <button class="arrow-btn" data-dir="left">◀</button>
            <button class="arrow-btn" data-dir="down">▼</button>
            <button class="arrow-btn" data-dir="right">▶</button>
          </div>
        </div>
      </div>

      <button class="reset-btn" id="resetPosBtn">↺ Reset Posisi & Ukuran</button>
    </div>
  </div>

<script>
const uploadMenu = document.getElementById('uploadMenu');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const textOverlay = document.getElementById('textOverlay');
const textOverlay2 = document.getElementById('textOverlay2');
const settingPanel = document.getElementById('settingPanel');

const STORAGE_KEY = 'peek_saved_image';
const SETTING_KEY = 'peek_settings';

// Variabel untuk posisi dan ukuran
let currentSelected = 'left'; // 'left' atau 'right'
let leftPos = { top: 25.5, left: 38.5 };
let rightPos = { top: 25.5, left: 61.5 };
let fontSize = 12;

// Load settings dari localStorage
function loadSettings() {
  const saved = localStorage.getItem(SETTING_KEY);
  if (saved) {
    try {
      const settings = JSON.parse(saved);
      leftPos = settings.leftPos || { top: 25.5, left: 38.5 };
      rightPos = settings.rightPos || { top: 25.5, left: 61.5 };
      fontSize = settings.fontSize || 12;
      
      // Terapkan ke DOM
      document.getElementById('fontSizeSlider').value = fontSize;
      document.getElementById('fontSizeValue').textContent = fontSize + 'px';
      
      updateTextPosition();
      updateFontSize();
    } catch(e) {}
  }
}

// Simpan settings ke localStorage
function saveSettings() {
  const settings = {
    leftPos: leftPos,
    rightPos: rightPos,
    fontSize: fontSize
  };
  localStorage.setItem(SETTING_KEY, JSON.stringify(settings));
}

// Update posisi teks berdasarkan variabel
function updateTextPosition() {
  textOverlay.style.top = leftPos.top + '%';
  textOverlay.style.left = leftPos.left + '%';
  textOverlay.style.transform = 'translateX(-50%)';
  
  textOverlay2.style.top = rightPos.top + '%';
  textOverlay2.style.left = rightPos.left + '%';
  textOverlay2.style.transform = 'translateX(-50%)';
}

// Update ukuran font
function updateFontSize() {
  textOverlay.style.fontSize = fontSize + 'px';
  textOverlay2.style.fontSize = fontSize + 'px';
  document.getElementById('fontSizeValue').textContent = fontSize + 'px';
}

// Geser posisi berdasarkan selected teks
function moveText(direction) {
  const step = 1.5; // persen per klik
  if (currentSelected === 'left') {
    switch(direction) {
      case 'up': leftPos.top = Math.max(5, leftPos.top - step); break;
      case 'down': leftPos.top = Math.min(90, leftPos.top + step); break;
      case 'left': leftPos.left = Math.max(15, leftPos.left - step); break;
      case 'right': leftPos.left = Math.min(85, leftPos.left + step); break;
    }
  } else {
    switch(direction) {
      case 'up': rightPos.top = Math.max(5, rightPos.top - step); break;
      case 'down': rightPos.top = Math.min(90, rightPos.top + step); break;
      case 'left': rightPos.left = Math.max(35, rightPos.left - step); break;
      case 'right': rightPos.left = Math.min(85, rightPos.left + step); break;
    }
  }
  updateTextPosition();
  saveSettings();
}

// Reset posisi dan ukuran
function resetPositionAndSize() {
  leftPos = { top: 25.5, left: 38.5 };
  rightPos = { top: 25.5, left: 61.5 };
  fontSize = 12;
  
  document.getElementById('fontSizeSlider').value = fontSize;
  document.getElementById('fontSizeValue').textContent = fontSize + 'px';
  
  updateTextPosition();
  updateFontSize();
  saveSettings();
}

// Gesture 2 jari swipe down untuk buka panel
let touchStartY = null;
let touchCount = 0;

document.addEventListener('touchstart', function(e) {
  touchCount = e.touches.length;
  if (touchCount === 2) {
    touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
});

document.addEventListener('touchmove', function(e) {
  if (touchCount === 2 && touchStartY !== null) {
    const currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const deltaY = currentY - touchStartY;
    
    // Swipe down lebih dari 60px
    if (deltaY > 60) {
      settingPanel.classList.add('open');
      touchStartY = null;
      e.preventDefault();
    }
  }
});

// Tutup panel dengan handle atau klik di luar (opsional)
document.querySelector('.panel-handle').addEventListener('click', () => {
  settingPanel.classList.remove('open');
});

// Load gambar dari localStorage
window.addEventListener('load', function() {
  loadSettings();
  
  const savedImage = localStorage.getItem(STORAGE_KEY);
  if (savedImage) {
    preview.src = savedImage;
    preview.style.display = 'block';
    textOverlay.style.display = 'block';
    textOverlay2.style.display = 'block';
  }
  updateTextFromAPI();
  
  // Load teks manual dari localStorage
  const savedLeftText = localStorage.getItem('peek_left_text');
  const savedRightText = localStorage.getItem('peek_right_text');
  if (savedLeftText) textOverlay.textContent = savedLeftText;
  if (savedRightText) textOverlay2.textContent = savedRightText;
});

// Double click upload
document.body.addEventListener('dblclick', () => {
  uploadMenu.style.display = 'block';
});

// Upload gambar
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const imageData = evt.target.result;
      localStorage.setItem(STORAGE_KEY, imageData);
      preview.src = imageData;
      preview.style.display = 'block';
      uploadMenu.style.display = 'none';
      textOverlay.style.display = 'block';
      textOverlay2.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

// Edit teks manual
document.getElementById('editTextLeft').addEventListener('input', (e) => {
  textOverlay.textContent = e.target.value || 'Facebook';
  localStorage.setItem('peek_left_text', textOverlay.textContent);
});

document.getElementById('editTextRight').addEventListener('input', (e) => {
  textOverlay2.textContent = e.target.value || 'Mail';
  localStorage.setItem('peek_right_text', textOverlay2.textContent);
});

// Font size slider
document.getElementById('fontSizeSlider').addEventListener('input', (e) => {
  fontSize = parseInt(e.target.value);
  updateFontSize();
  saveSettings();
});

// Selector teks kiri/kanan
document.getElementById('selectLeftBtn').addEventListener('click', () => {
  currentSelected = 'left';
  document.getElementById('selectLeftBtn').classList.add('active');
  document.getElementById('selectRightBtn').classList.remove('active');
});

document.getElementById('selectRightBtn').addEventListener('click', () => {
  currentSelected = 'right';
  document.getElementById('selectRightBtn').classList.add('active');
  document.getElementById('selectLeftBtn').classList.remove('active');
});

// Event listener untuk tombol panah
document.querySelectorAll('.arrow-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const dir = btn.getAttribute('data-dir');
    moveText(dir);
  });
});

// Reset button
document.getElementById('resetPosBtn').addEventListener('click', () => {
  resetPositionAndSize();
});

// Capitalize
function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// API text (tetap berjalan tapi tidak override jika ada teks manual)
let manualLeftSet = false;
let manualRightSet = false;

document.getElementById('editTextLeft').addEventListener('focus', () => { manualLeftSet = true; });
document.getElementById('editTextRight').addEventListener('focus', () => { manualRightSet = true; });

async function updateTextFromAPI() {
  try {
    const response = await fetch('https://11z.co/_w/6804/selection?_t=' + Date.now());
    const data = await response.json();

    if (data.value && !manualLeftSet) {
      const words = data.value.trim().split(/\s+/);
      if (!manualLeftSet) textOverlay.textContent = capitalize(words[0] || 'Facebook');
      if (!manualRightSet) textOverlay2.textContent = capitalize(words[1] || 'Mail');
    }
  } catch (err) {
    // keep existing text
  }
}

setInterval(updateTextFromAPI, 2000);
</script>

</body>
</html>
