<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }

  body {
    position: fixed;
    inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  /* 🔥 INI YANG PENTING */
  #preview {
    position: fixed;
    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;
    object-position: center;

    display: none;
    z-index: 2;
  }

  #uploadMenu {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 10px;
    z-index: 10;
  }

  #textOverlay, #textOverlay2 {
    position: absolute;
    color: white;
    font-size: 12px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: none;
    z-index: 5;
  }

  #textOverlay {
    top: 25.5%;
    left: 38.5%;
    transform: translateX(-50%);
  }

  #textOverlay2 {
    top: 25.5%;
    left: 61.5%;
    transform: translateX(-50%);
  }
</style>
