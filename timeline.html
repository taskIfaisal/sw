<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Timeline</title>

  <link rel="apple-touch-icon" href="./icon/timeline-192x192.png">
  <link rel="apple-touch-startup-image" href="./icon/timeline-512x512.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Timeline">

  <link rel="icon" type="image/png" sizes="192x192" href="./icon/timeline-192x192.png">

  <!-- Font iPhone Style -->
  <style>
    @font-face {
      font-family: 'SF Pro Display';
      src: local('SF Pro Display'), local('San Francisco');
      font-weight: 100 900;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: black;
      color: white;
      overflow: hidden;
      position: relative;
    }

    body {
      position: fixed;
      inset: 0;
    }

    * {
      box-sizing: border-box;
    }

    #background {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    #lock-icon {
      width: 10px;
      display: block;
      margin: 6px auto 0;
    }

    /* 🔥 FONT JAM MIRIP IPHONE */
    #time {
      font-size: 11vh;
      font-weight: 200;
      letter-spacing: -2px;
      text-align: center;
      margin-top: 5vh;

      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    #date {
      font-size: 3.4vh;
      text-align: center;
      margin-top: -1vh;
    }

    #bottom-text {
      font-size: 2.5vh;
      font-weight: bold;
      text-align: center;
      position: absolute;
      bottom: 5vh;
      left: 0;
      right: 0;
      width: 100%;
      margin: 0 auto;
    }

    #bottom-bar {
      position: absolute;
      bottom: 0vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    /* 🔥 FIX DOT AGAR NORMAL */
    #dot {
      font-size: 1.6vh; /* ukuran normal kecil */
      line-height: 1;
    }

    #camera-icon {
      width: 14px;
    }

    #setting-layer {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(0,0,0,0.95);
      color: white;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #setting-layer input {
      margin-top: 2vh;
    }

    #close-setting {
      position: absolute;
      top: 2vh;
      right: 2vh;
      font-size: 2.5vh;
      cursor: pointer;
    }

    #tap-zone {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .top-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: auto;
      margin-top: 4vh;
    }
  </style>
</head>

<body>

  <div id="tap-zone">
    <div class="top-content">
      <img id="lock-icon" src="icon/lock.png" alt="lock">
      <div>
        <div id="time">16.44</div>
        <div id="date">Sabtu, 19 Juli</div>
      </div>
    </div>

    <div>
      <div id="bottom-text">Tekan tombol utama - buka kunci</div>
      <div id="bottom-bar">
        <span id="dot">●</span>
        <img id="camera-icon" src="icon/camera.png" alt="camera">
      </div>
    </div>
  </div>

  <div id="setting-layer">
    <div id="close-setting">✕</div>
    <h2>Ganti Background</h2>
    <input type="file" accept="image/*" id="bg-input">
    <h2>Atur Menit Mundur</h2>
    <input type="number" id="extra-minutes" placeholder="Tambah menit (misal 7)" min="1">
    <button id="apply-time-travel">Simpan & Tutup</button>
  </div>

<script>
let extraMinutes = 0;
let fakeOffset = 0;
let isRewinding = false;

const BG_STORAGE_KEY = 'timeline_background_image';

window.addEventListener('load', function() {
  const savedBackground = localStorage.getItem(BG_STORAGE_KEY);
  if (savedBackground) {
    document.body.style.backgroundImage = `url('${savedBackground}')`;
  }
});

document.getElementById('apply-time-travel').addEventListener('click', () => {
  const inputMinutes = parseInt(document.getElementById('extra-minutes').value, 10);
  if (!isNaN(inputMinutes) && inputMinutes > 0) {
    extraMinutes = inputMinutes;
    fakeOffset = extraMinutes;
  }
  document.getElementById('setting-layer').style.display = 'none';
});

function updateTimeDisplay(dateObj) {
  const jam = dateObj.getHours().toString().padStart(2, '0');
  const menit = dateObj.getMinutes().toString().padStart(2, '0');
  document.getElementById('time').textContent = `${jam}.${menit}`;

  const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  document.getElementById('date').textContent =
    `${hari[dateObj.getDay()]}, ${dateObj.getDate()} ${bulan[dateObj.getMonth()]}`;
}

function updateTime() {
  const now = new Date();
  let displayTime = new Date(now.getTime() + fakeOffset * 60000);

  if (isRewinding) {
    fakeOffset -= 0.3;
    if (fakeOffset <= 0) {
      fakeOffset = 0;
      isRewinding = false;
    }
    displayTime = new Date(now.getTime() + fakeOffset * 60000);
  }

  updateTimeDisplay(displayTime);
}

setInterval(updateTime, 300);

document.getElementById('time').addEventListener('touchend', startRewind);
document.getElementById('date').addEventListener('touchend', startRewind);

function startRewind() {
  if (fakeOffset > 0 && !isRewinding) {
    isRewinding = true;
  }
}

document.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    startY = Math.min(e.touches[0].clientY, e.touches[1].clientY);
  }
});

document.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    const currentY = Math.min(e.touches[0].clientY, e.touches[1].clientY);
    if (currentY - startY > 80) {
      document.getElementById('setting-layer').style.display = 'flex';
    }
  }
});

document.getElementById('close-setting').onclick = () => {
  document.getElementById('setting-layer').style.display = 'none';
};

document.getElementById('bg-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const imageData = evt.target.result;
      localStorage.setItem(BG_STORAGE_KEY, imageData);
      document.body.style.backgroundImage = `url('${imageData}')`;
    };
    reader.readAsDataURL(file);
  }
});
</script>

</body>
</html>
