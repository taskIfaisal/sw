<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card Trick</title>
    <link rel="apple-touch-icon" href="./icon/card2phone-512x512.png">
    <link rel="apple-touch-startup-image" href="./icon/card2phone-512x512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Card2Phone">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon/card2phone-512x512.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'SF Pro Display', sans-serif;
            background-color: black;
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }

        * {
            box-sizing: border-box;
        }
        
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        
        #card {
            position: absolute;
            width: 100%;
            max-width: 200px;
            z-index: 2;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
            /* Tambahkan ini untuk zoom yang lebih baik */
            transform-origin: center center;
            height: auto; /* Biarkan tinggi menyesuaikan */
            /* Untuk efek fade - diambil dari code kedua */
            opacity: 0;
            animation: muncul 5s ease-in-out;
        }

        /* Efek animasi dari code kedua - duration 5s */
        @keyframes muncul {
            0% {
                opacity: 0;
            }
            50% {
                opacity: 0.3;
            }
            80% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }

        /* Class untuk kontrol fade */
        .card-fade-hidden {
            opacity: 0 !important;
            pointer-events: none;
            animation: none; /* Matikan animasi saat hidden */
        }
        
        .card-fade-visible {
            opacity: 1 !important;
            pointer-events: auto;
            animation: muncul 5s ease-in-out; /* Animasi saat muncul */
        }

        /* Style untuk slider card size */
        .size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            height: 5px;
            background: #4CAF50;
            border-radius: 5px;
            outline: none;
            flex: 1;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #4CAF50;
        }
        
        #size-value {
            min-width: 50px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 3px;
        }
        
        #settings {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3;
            transition: top 0.5s ease;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .setting-section {
            margin-bottom: 20px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-upload {
            background: #2196F3;
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            cursor: pointer;
        }

        /* Toggle Switch Styles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            margin: 10px 0;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #4CAF50;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        .effect-description {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        /* Editor Modal Styles */
        .image-editor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .editor-container {
            position: relative;
            width: 90%;
            height: 70%;
            margin: 20px;
        }

        #editing-card {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: 0 auto;
            touch-action: none;
            /* Tambahkan ini untuk zoom yang lebih baik */
            transform-origin: center center;
        }

        .editor-controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.7);
        }

        .editor-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .editor-buttons button {
            min-width: 100px;
        }

        #cancel-edit {
            background: #f44336;
        }
        
        /* Permission button for iOS */
        #sensor-permission {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            font-size: 24px;
            z-index: 9999;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            text-align: center;
            padding: 20px;
            cursor: pointer;
        }
        
        #sensor-permission.hidden {
            display: none;
        }

        /* Style untuk modal album GitHub - Diperbarui dengan folder system */
        .github-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }
        
        .modal-header h3 {
            margin: 0;
            color: #4CAF50;
        }
        
        .modal-header button {
            background: #f44336;
            margin: 0;
            padding: 8px 15px;
        }

        .folder-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .back-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: #45a049;
        }
        
        /* Albums grid untuk folder */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .album-item {
            background: #222;
            padding: 20px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #444;
            text-align: center;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .album-item:hover {
            background: #333;
            transform: scale(1.05);
            border-color: #4CAF50;
        }
        
        .album-item:active {
            transform: scale(0.95);
        }
        
        .album-item .folder-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .album-item .folder-name {
            font-size: 14px;
            word-break: break-word;
        }
        
        /* Image grid - 3 kolom untuk gambar */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .grid-item {
            width: 100%;
            aspect-ratio: 1/1;
            border: 2px solid #444;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #222;
        }
        
        .grid-item:hover {
            border-color: #4CAF50;
            transform: scale(1.02);
        }
        
        .grid-item.selected {
            border-color: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            grid-column: span 3;
        }
        
        .error-msg {
            color: #f44336;
            text-align: center;
            padding: 20px;
            grid-column: span 3;
        }
        
        .modal-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #444;
        }
        
        .apply-btn {
            width: 100%;
            background: #2196F3;
            padding: 15px;
            font-size: 16px;
        }

        /* ===== FRAME PREVIEW UNTUK KARTU UTAMA - FULL WIDTH ===== */
        .preview-frame-container {
            margin: 20px -20px; /* Negatif margin untuk tembus padding settings */
            width: 100vw; /* Full viewport width */
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }
        
        .preview-label {
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 20px; /* Padding kembali untuk label */
        }
        
        .editor-frame {
            width: 100vw; /* Full viewport width - sampai pinggir HP */
            height: 280px;
            border-top: 2px solid #4CAF50;
            border-bottom: 2px solid #4CAF50;
            border-left: none; /* Tanpa border kiri */
            border-right: none; /* Tanpa border kanan */
            background: #222;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            margin: 0;
            box-sizing: border-box;
        }
        
        #main-card-preview {
            position: absolute;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            object-fit: contain;
            pointer-events: none;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="background"></div>
    <img id="card" src="https://raw.githubusercontent.com/taskIfaisal/sw/main/icon/Basketball.png" alt="Magic Ball">
    <div id="settings">
        <h2>Magic Card Settings</h2>
        
        <div class="setting-section">
            <h3>Background Image</h3>
            <label class="file-upload">
                Choose Background
                <input type="file" id="bg-upload" accept="image/*">
            </label>
        </div>
        
        <div class="setting-section">
            <h3>Card Image</h3>
            <label class="file-upload">
                Choose Card
                <input type="file" id="card-upload" accept="image/*">
            </label>
            <!-- TOMOL DEFAULT CARD DIUBAH MENJADI GITHUB ALBUM -->
            <button id="github-album-btn">📁 GitHub Cards Album</button>
        </div>

        <!-- ===== EFFECT SHADOW TOGGLE ===== -->
        <div class="setting-section">
            <h3>Effect Shadow</h3>
            <label class="toggle-switch">
                <input type="checkbox" id="shadow-effect" checked>
                <span class="toggle-slider"></span>
            </label>
            <div class="effect-description">
                ON: Kartu muncul dengan animasi 5 detik (fade bertahap)<br>
                OFF: Kartu muncul langsung (normal)
            </div>
        </div>

        <!-- ===== FRAME PREVIEW KARTU UTAMA - DITEMPATKAN DI ATAS SLIDER ===== -->
        <div class="preview-frame-container">
            <div class="preview-label">🔮 PREVIEW KARTU UTAMA</div>
            <div class="editor-frame">
                <img id="main-card-preview" src="https://raw.githubusercontent.com/taskIfaisal/sw/main/icon/Basketball.png" alt="Main Card Preview">
            </div>
        </div>

        <!-- CARD SIZE SLIDER SECTION (TAMBAHAN BARU) -->
        <div class="setting-section">
            <h3>Card Size</h3>
            <div class="size-control">
                <input type="range" id="card-size-slider" min="100" max="400" value="200" step="5">
                <span id="size-value">200px</span>
            </div>
            <small>Adjust card size (100px - 400px)</small>
        </div>
        
        <div class="setting-section">
            <button id="close-settings">Save & Close</button>
        </div>
    </div>
    
    <!-- Sensor Permission Button -->
    <button id="sensor-permission" class="hidden">
        Allow Motion Sensor Access<br>
        <small>(Tap to enable tilt controls)</small>
    </button>

    <script>
        // Elements
        const background = document.getElementById('background');
        const card = document.getElementById('card');
        const settings = document.getElementById('settings');
        const bgUpload = document.getElementById('bg-upload');
        const cardUpload = document.getElementById('card-upload');
        const githubAlbumBtn = document.getElementById('github-album-btn');
        const closeSettingsBtn = document.getElementById('close-settings');
        const sensorPermissionBtn = document.getElementById('sensor-permission');
        
        // Card size elements
        const cardSizeSlider = document.getElementById('card-size-slider');
        const sizeValue = document.getElementById('size-value');
        
        // Preview element untuk kartu utama
        const mainCardPreview = document.getElementById('main-card-preview');
        
        // Effect Shadow toggle
        const shadowEffectCheckbox = document.getElementById('shadow-effect');

        // GitHub API URL - Diubah ke folder images untuk struktur folder
        const GITHUB_API_URL = 'https://api.github.com/repos/taskIfaisal/sw/contents/images';
        
        // State untuk album dengan folder system
        let currentFolder = null; // null berarti di root (menampilkan folder)
        let selectedImage = null;
        let modalElement = null;

        let isExiting = false;

        // Initialize card properties
        let posX = window.innerWidth / 2 - card.offsetWidth / 2;
        let posY = window.innerHeight / 2 - card.offsetHeight / 2;
        let scale = 1;
        let isDragging = false;
        let startX, startY;
        let velocityX = 0;
        let velocityY = 0;
        let lastPosX = 0;
        let lastPosY = 0;
        let lastTime = 0;
        
        // SENSOR VARIABLES - Ditambahkan
        let smoothBeta = 0;      // Untuk smoothing beta (tilt depan-belakang)
        let smoothGamma = 0;     // Untuk smoothing gamma (tilt kiri-kanan)
        const sensitivity = 0.5; // Sensitivitas gerakan kartu
        const smoothing = 0.2;   // Smoothing untuk gerakan halus
        let isSensorEnabled = false;
        
        // ===== LOCAL STORAGE SETUP =====
        const STORAGE_KEY = 'magic_card_data';
        
        // Load saved data on startup
        loadFromStorage();
        
        // ===== CARD SIZE CONTROL =====
        // Load saved size or use default 200
        let currentCardSize = parseInt(localStorage.getItem('card_size')) || 200;
        
        // Apply initial size
        card.style.maxWidth = currentCardSize + 'px';
        sizeValue.textContent = currentCardSize + 'px';
        cardSizeSlider.value = currentCardSize;
        
        // Update preview card size
        function updatePreviewCardSize() {
            // Atur ukuran preview kartu utama sesuai dengan ukuran slider
            mainCardPreview.style.width = currentCardSize + 'px';
            mainCardPreview.style.height = 'auto';
            // Posisikan sedikit turun (30px dari atas frame)
            mainCardPreview.style.position = 'absolute';
            mainCardPreview.style.top = '30px';
            mainCardPreview.style.left = '50%';
            mainCardPreview.style.transform = 'translateX(-50%)';
        }
        
        // Update preview dengan image card saat ini
        function updateMainCardPreview() {
            mainCardPreview.src = card.src;
        }
        
        // Panggil fungsi untuk mengatur posisi awal preview
        updatePreviewCardSize();
        updateMainCardPreview();
        
        // Slider event listener
        cardSizeSlider.addEventListener('input', (e) => {
            const newSize = e.target.value;
            sizeValue.textContent = newSize + 'px';
            card.style.maxWidth = newSize + 'px';
            
            // Update ukuran preview kartu utama secara real-time
            currentCardSize = parseInt(newSize);
            updatePreviewCardSize();
            
            // Update posisi kartu jika sedang muncul
            if (card.style.display !== 'none') {
                const oldWidth = card.offsetWidth;
                setTimeout(() => {
                    const newWidth = card.offsetWidth;
                    // Sesuaikan posisi X agar kartu tetap di area yang sama
                    posX = posX - (newWidth - oldWidth) / 2;
                    applyBounds();
                    updateCardTransform();
                }, 10);
            }
        });

        // Save size when change
        cardSizeSlider.addEventListener('change', (e) => {
            localStorage.setItem('card_size', e.target.value);
            currentCardSize = parseInt(e.target.value);
            autoSave();
        });
        
        // Set initial positions
        updateCardTransform();
        
        // Initialize sensor
        initSensor();
        
        // ===== FUNGSI UNTUK ALBUM GITHUB DENGAN FOLDER SYSTEM =====
        async function loadRootFolders() {
            try {
                const response = await fetch(GITHUB_API_URL);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.json();
                
                // Filter hanya folder (type = "dir")
                const folders = data.filter(item => item.type === "dir");
                
                // Sorting folder berdasarkan nama
                folders.sort((a, b) => {
                    return a.name.localeCompare(b.name, undefined, { 
                        numeric: true,
                        sensitivity: 'base' 
                    });
                });
                
                return folders;
            } catch (error) {
                console.error('Error loading root folders:', error);
                return [];
            }
        }
        
        async function loadFolderContents(folderName) {
            try {
                const folderUrl = `${GITHUB_API_URL}/${folderName}`;
                const response = await fetch(folderUrl);
                if (!response.ok) throw new Error('Failed to fetch folder');
                
                const data = await response.json();
                
                // Filter hanya file gambar
                const images = data.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return ['png', 'jpg', 'jpeg', 'gif'].includes(ext);
                });
                
                // Sorting gambar berdasarkan nama
                images.sort((a, b) => {
                    return a.name.localeCompare(b.name, undefined, { 
                        numeric: true,
                        sensitivity: 'base' 
                    });
                });
                
                return images;
            } catch (error) {
                console.error('Error loading folder contents:', error);
                return [];
            }
        }
        
        function showGithubModal() {
            selectedImage = null;
            currentFolder = null; // Reset ke root
            
            // Buat modal
            modalElement = document.createElement('div');
            modalElement.className = 'github-modal';
            modalElement.innerHTML = `
                <div class="modal-header">
                    <h3>📁 Pilih Gambar dari GitHub</h3>
                    <button id="close-modal">✕</button>
                </div>
                <div id="modal-content">
                    <div class="loading">Loading folders from GitHub...</div>
                </div>
                <div class="modal-footer">
                    <button id="modal-apply" class="apply-btn" disabled>Pilih gambar dulu</button>
                </div>
            `;
            
            document.body.appendChild(modalElement);
            
            // Event listener untuk close
            document.getElementById('close-modal').addEventListener('click', () => {
                document.body.removeChild(modalElement);
                modalElement = null;
            });
            
            // Event listener untuk apply
            const applyBtn = document.getElementById('modal-apply');
            applyBtn.addEventListener('click', () => {
                if (selectedImage) {
                    // Update card image
                    card.src = selectedImage;
                    
                    // Update preview card utama
                    updateMainCardPreview();
                    
                    // Reset scale when new image is loaded
                    scale = 1;
                    updateCardTransform();
                    autoSave();
                    
                    // Tutup modal
                    document.body.removeChild(modalElement);
                    modalElement = null;
                }
            });
            
            // Tampilkan folder-folder
            renderFolders();
        }
        
        async function renderFolders() {
            const contentElement = document.getElementById('modal-content');
            
            const folders = await loadRootFolders();
            
            if (folders.length === 0) {
                contentElement.innerHTML = '<div class="error-msg">Tidak ada folder ditemukan</div>';
                return;
            }
            
            let html = '<div class="albums-grid">';
            
            folders.forEach(folder => {
                html += `
                    <div class="album-item" onclick="window.openFolder('${folder.name}')">
                        <div class="folder-icon">📁</div>
                        <div class="folder-name">${folder.name}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            contentElement.innerHTML = html;
        }
        
        // Fungsi untuk membuka folder - dibuat global agar bisa dipanggil dari onclick
        window.openFolder = async function(folderName) {
            currentFolder = folderName;
            selectedImage = null;
            
            // Disable apply button
            const applyBtn = document.getElementById('modal-apply');
            applyBtn.disabled = true;
            applyBtn.textContent = 'Pilih gambar dulu';
            
            const contentElement = document.getElementById('modal-content');
            contentElement.innerHTML = '<div class="loading">Loading images...</div>';
            
            const images = await loadFolderContents(folderName);
            
            if (images.length === 0) {
                contentElement.innerHTML = `
                    <div class="folder-header">
                        <button class="back-button" onclick="window.goBackToFolders()">← Back</button>
                        <h3>${folderName}</h3>
                    </div>
                    <div class="error-msg">Tidak ada gambar dalam folder ini</div>
                `;
                return;
            }
            
            let html = `
                <div class="folder-header">
                    <button class="back-button" onclick="window.goBackToFolders()">← Back</button>
                    <h3>${folderName}</h3>
                </div>
                <div class="image-grid">
            `;
            
            images.forEach(img => {
                const downloadUrl = img.download_url || `https://raw.githubusercontent.com/taskIfaisal/sw/main/images/${folderName}/${img.name}`;
                
                html += `
                    <div class="grid-item" data-url="${downloadUrl}">
                        <img src="${downloadUrl}" alt="${img.name}" loading="lazy">
                    </div>
                `;
            });
            
            html += '</div>';
            contentElement.innerHTML = html;
            
            // Tambahkan event listener ke grid items
            document.querySelectorAll('.grid-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.grid-item').forEach(i => {
                        i.classList.remove('selected');
                    });
                    
                    item.classList.add('selected');
                    selectedImage = item.dataset.url;
                    
                    const applyBtn = document.getElementById('modal-apply');
                    applyBtn.disabled = false;
                    applyBtn.textContent = `Apply Gambar`;
                    applyBtn.style.background = '#4CAF50';
                });
            });
        };
        
        // Fungsi untuk kembali ke daftar folder - dibuat global
        window.goBackToFolders = function() {
            currentFolder = null;
            selectedImage = null;
            
            const applyBtn = document.getElementById('modal-apply');
            applyBtn.disabled = true;
            applyBtn.textContent = 'Pilih gambar dulu';
            
            renderFolders();
        };
        
        // ===== LOCAL STORAGE FUNCTIONS =====
        function loadFromStorage() {
            try {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    const data = JSON.parse(savedData);
                    
                    // Load background image
                    if (data.background) {
                        background.style.backgroundImage = `url(${data.background})`;
                    }
                    
                    // Load card image
                    if (data.cardImage) {
                        card.src = data.cardImage;
                        // Update preview setelah card dimuat
                        setTimeout(() => {
                            updateMainCardPreview();
                        }, 100);
                    }
                    
                    // Load shadow effect setting
                    if (data.shadowEffect !== undefined) {
                        shadowEffectCheckbox.checked = data.shadowEffect;
                    }
                }
                
                // Load card size (jika ada di storage terpisah)
                const savedSize = localStorage.getItem('card_size');
                if (savedSize) {
                    currentCardSize = parseInt(savedSize);
                    card.style.maxWidth = currentCardSize + 'px';
                    cardSizeSlider.value = currentCardSize;
                    sizeValue.textContent = currentCardSize + 'px';
                    updatePreviewCardSize();
                }
            } catch (error) {
                console.error('Error loading from storage:', error);
            }
        }
        
        function saveToStorage() {
            try {
                const data = {
                    background: background.style.backgroundImage.replace('url("', '').replace('")', ''),
                    cardImage: card.src,
                    shadowEffect: shadowEffectCheckbox.checked
                };
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (error) {
                console.error('Error saving to storage:', error);
            }
        }
        
        function autoSave() {
            saveToStorage();
        }
        // ===== END LOCAL STORAGE FUNCTIONS =====
        
        // Touch events for swipe up to open settings
        let startYPos = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                startYPos = e.touches[0].clientY;
            }
        }, {passive: false});
        
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const currentY = e.touches[0].clientY;
                if (currentY - startYPos > 100) { // Swipe UP with two fingers
                    e.preventDefault();
                    settings.style.top = '0';
                }
            }
        }, {passive: false});
        
        // Double click/tap to show card
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                // Double tap detected
                showCard();
            }
            lastTap = currentTime;
        });
        
        // Single tap on card to hide (hanya jika shadow effect ON)
        card.addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah event bubbling
            if (shadowEffectCheckbox.checked) {
                hideCard();
            }
        });
        
        // Card dragging functionality with velocity tracking
        card.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - posX;
                startY = e.touches[0].clientY - posY;
                velocityX = 0;
                velocityY = 0;
                lastPosX = posX;
                lastPosY = posY;
                lastTime = Date.now();
                e.preventDefault();
            }
        }, {passive: false});
        
        document.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const now = Date.now();
                const deltaTime = now - lastTime;
                
                if (deltaTime > 0) {
                    const newPosX = e.touches[0].clientX - startX;
                    const newPosY = e.touches[0].clientY - startY;
                    
                    velocityX = (newPosX - lastPosX) / deltaTime * 1000;
                    velocityY = (newPosY - lastPosY) / deltaTime * 1000;
                    
                    lastPosX = newPosX;
                    lastPosY = newPosY;
                    lastTime = now;
                    
                    posX = newPosX;
                    posY = newPosY;
                    
                    // Apply bounds saat dragging juga
                    updateCardTransform();
                }
                e.preventDefault();
            }
        }, {passive: false});
        
        document.addEventListener('touchend', (e) => {
            if (isDragging) {
                isDragging = false;
                
                // Check if card is flicked quickly
                const speedThreshold = 1000; // pixels per second
                const currentSpeed = Math.sqrt(velocityX * velocityX + velocityY * velocityY);
                
                // Cek apakah kartu keluar batas (flick detection)
                const outTop    = posY < -card.offsetHeight * scale * 0.4;
                const outBottom = posY > window.innerHeight - card.offsetHeight * scale * 0.6;
                const outLeft   = posX < -card.offsetWidth * scale * 0.4;
                const outRight  = posX > window.innerWidth - card.offsetWidth * scale * 0.6;

                if (outTop || outBottom || outLeft || outRight) {
                    hideCard();
                    return;
                }
            }
        });
        
        // Settings functionality
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    background.style.backgroundImage = `url(${event.target.result})`;
                    autoSave(); // Save when background changes
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Card upload with image editor
        cardUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    showImageEditor(event.target.result, (editedImage) => {
                        card.src = editedImage;
                        // Update preview card utama
                        updateMainCardPreview();
                        // Reset scale when new image is loaded
                        scale = 1;
                        updateCardTransform();
                        autoSave(); // Save when card changes
                    });
                };
                reader.readAsDataURL(file);
            }
        });
        
        // GitHub Album button - dengan folder system
        githubAlbumBtn.addEventListener('click', () => {
            showGithubModal();
        });
        
        closeSettingsBtn.addEventListener('click', () => {
            settings.style.top = '-100%';
            autoSave(); // Save when settings are closed
        });
        
        // Shadow effect toggle change
        shadowEffectCheckbox.addEventListener('change', () => {
            autoSave();
        });
        
        // ===== SENSOR IMPLEMENTATION =====
        function initSensor() {
            // Cek apakah perlu permission (untuk iOS)
            if (typeof DeviceOrientationEvent?.requestPermission === "function") {
                sensorPermissionBtn.classList.remove('hidden');
                
                sensorPermissionBtn.onclick = async () => {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === "granted") {
                            sensorPermissionBtn.classList.add('hidden');
                            startSensor();
                        }
                    } catch (error) {
                        console.error("Error requesting permission:", error);
                        sensorPermissionBtn.innerHTML = "Error requesting permission.<br>Try refreshing the page.";
                    }
                };
            } else {
                // Untuk browser yang tidak memerlukan permission
                startSensor();
            }
        }
        
        function startSensor() {
            isSensorEnabled = true;
            window.addEventListener("deviceorientation", handleDeviceOrientation);
            startSensorAnimation();
        }
        
        function handleDeviceOrientation(e) {
            // Hanya proses jika kartu terlihat dan tidak sedang didrag
            if (!card.style.display || card.style.display === 'none' || isDragging) return;

            // Batasi nilai beta dan gamma antara -45 sampai 45 derajat
            const beta = Math.max(-45, Math.min(45, e.beta || 0));
            const gamma = Math.max(-45, Math.min(45, e.gamma || 0));

            // Smoothing untuk gerakan yang lebih halus
            smoothBeta += (beta - smoothBeta) * smoothing;
            smoothGamma += (gamma - smoothGamma) * smoothing;
        }
        
        function startSensorAnimation() {
            function animate() {
                // Hanya gerakkan kartu jika sensor enabled dan tidak sedang didrag
                if (isSensorEnabled && !isDragging && card.style.display !== 'none') {
                    // Gerakkan kartu berdasarkan nilai sensor
                    posX += smoothGamma * sensitivity;
                    posY += smoothBeta * sensitivity;
                    
                    // PASTIKAN KARTU TIDAK KELUAR DARI BATAS LAYAR
                    applyBounds();
                    updateCardTransform();
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        function applyBounds() {
            // Hitung ukuran kartu yang sudah discale
            const cardWidth = card.offsetWidth * scale;
            const cardHeight = card.offsetHeight * scale;
            
            // PERBAIKAN: Hitung batas dengan benar
            const minX = 0;
            const maxX = window.innerWidth - cardWidth;
            const minY = 0;
            const maxY = window.innerHeight - cardHeight;
            
            // Terapkan batas dengan benar
            posX = Math.max(minX, Math.min(maxX, posX));
            posY = Math.max(minY, Math.min(maxY, posY));
        }
        // ===== END SENSOR IMPLEMENTATION =====
        
        // Image Editor Function
        function showImageEditor(imageSrc, callback) {
            // Create editor modal
            const editor = document.createElement('div');
            editor.className = 'image-editor';
            editor.innerHTML = `
                <div class="editor-container">
                    <img id="editing-card" src="${imageSrc}" alt="Card being edited">
                    <div class="editor-controls">
                        <div style="color:white; margin-bottom:10px;">Pinch to zoom</div>
                        <div class="editor-buttons">
                            <button id="save-edit">Save</button>
                            <button id="cancel-edit">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(editor);
            
            const editingCard = document.getElementById('editing-card');
            const saveBtn = document.getElementById('save-edit');
            const cancelBtn = document.getElementById('cancel-edit');
            
            let currentScale = 1;
            let startDistance = 0;
            
            // Zoom with pinch gesture
            editingCard.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    startDistance = getDistance(
                        e.touches[0].clientX, e.touches[0].clientY,
                        e.touches[1].clientX, e.touches[1].clientY
                    );
                }
            }, {passive: false});
            
            editingCard.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const currentDistance = getDistance(
                        e.touches[0].clientX, e.touches[0].clientY,
                        e.touches[1].clientX, e.touches[1].clientY
                    );
                    
                    if (startDistance > 0) {
                        currentScale = Math.max(0.3, Math.min(3, currentDistance / startDistance));
                        editingCard.style.transform = `scale(${currentScale})`;
                    }
                }
            }, {passive: false});
            
            editingCard.addEventListener('touchend', () => {
                startDistance = 0;
            }, {passive: false});
            
            // Save/cancel buttons
            saveBtn.addEventListener('click', () => {
                document.body.removeChild(editor);
                callback(imageSrc); // Return the original image (scaling is handled by CSS)
            });
            
            cancelBtn.addEventListener('click', () => {
                document.body.removeChild(editor);
            });
        }
        
        // Helper function to calculate distance between two points
        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }
        
        // Helper functions
        function updateCardTransform() {
            card.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }
        
        function hideCard() {
            if (shadowEffectCheckbox.checked) {
                // Fade out effect - langsung hide karena animasi hanya untuk muncul
                card.style.display = 'none';
                card.style.opacity = '0';
            } else {
                // Langsung hide tanpa efek
                card.style.display = 'none';
                card.style.opacity = '0';
            }
        }
        
        function showCard() {
            // Reset to center position
            posX = window.innerWidth / 2 - (card.offsetWidth * scale) / 2;
            posY = window.innerHeight / 2 - (card.offsetHeight * scale) / 2;
            
            if (shadowEffectCheckbox.checked) {
                // Animasi muncul 5 detik dari code kedua
                card.style.display = 'block';
                card.style.opacity = '1'; // Opacity diatur oleh animasi
                card.style.animation = 'muncul 5s ease-in-out';
                updateCardTransform();
                
                // Hapus animation setelah selesai agar bisa diulang next time
                setTimeout(() => {
                    card.style.animation = 'none';
                }, 5000);
            } else {
                // Langsung tampilkan tanpa efek
                card.style.display = 'block';
                card.style.opacity = '1';
                card.style.animation = 'none';
                updateCardTransform();
            }
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            posX = window.innerWidth / 2 - (card.offsetWidth * scale) / 2;
            posY = window.innerHeight / 2 - (card.offsetHeight * scale) / 2;
            updateCardTransform();
        });
        
        // Save before page unload
        window.addEventListener('beforeunload', () => {
            saveToStorage();
        });

        // Pre-load root folders di background
        window.addEventListener('load', () => {
            loadRootFolders();
            // Pastikan preview update setelah load
            setTimeout(() => {
                updateMainCardPreview();
                updatePreviewCardSize();
                // Set initial card visible
                card.style.display = 'block';
                card.style.opacity = '1';
                card.style.animation = 'none';
            }, 200);
        });
    </script>
</body>
